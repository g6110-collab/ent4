<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Entry Network Finder</title>
    <style>
        :root { --main: #00c73c; --bg: #f5f6f7; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        select, input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--main); color: white; border: none; font-weight: bold; cursor: pointer; }
        .status { font-size: 0.85rem; color: #666; margin: 10px 0; min-height: 20px; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 450px; margin-top: 20px; }
        .user-card { background: white; padding: 10px; border-radius: 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; border: 1px solid #eee; transition: 0.2s; }
        .user-card:hover { transform: translateY(-2px); border-color: var(--main); }
        .user-card img { width: 40px; height: 40px; border-radius: 50%; background: #eee; }
        .user-card span { font-size: 0.85rem; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎯 유명인 인맥 검색기</h2>
    <p style="font-size:0.8rem; color:#888;">유명인의 팔로워 목록에서 특정 유저를 찾아냅니다.</p>
    
    <select id="celebId">
        <option value="56459146059c36353d68305c">엔트리프렌즈 (공식)</option>
        <option value="60ae3cd4827dd00326433cac">꧁게르맨꧂</option>
        <option value="6925484ee7eba32d80e3f45f">무지개워러</option>
        <option value="60f68cf316052f0eeaf9dded">팔로우봇 (3대가대머리)</option>
    </select>

    <input type="text" id="searchName" placeholder="찾을 닉네임 입력 (일부만 쳐도 됨)">
    <button onclick="startDeepSearch()">팔로워 리스트에서 찾기</button>
    
    <div id="status" class="status"></div>
</div>

<div id="results" class="result-grid"></div>

<script>
    let stopSearch = false;

    async function startDeepSearch() {
        const celebId = document.getElementById('celebId').value;
        const targetName = document.getElementById('searchName').value.trim();
        const status = document.getElementById('status');
        const results = document.getElementById('results');

        if (!targetName) return alert("찾을 닉네임을 입력하세요!");

        results.innerHTML = '';
        status.innerText = "데이터 스캔 중... (시간이 걸릴 수 있습니다)";
        stopSearch = false;

        // 팔로워 목록을 페이지별로 탐색 (최대 10페이지까지 검색 - 조절 가능)
        for (let page = 1; page <= 15; page++) {
            if (stopSearch) break;
            
            try {
                const api = `https://playentry.org{celebId}/followers?page=${page}&perPage=40`;
                const proxy = `https://allorigins.win{encodeURIComponent(api)}&_=${new Date().getTime()}`;
                
                const res = await fetch(proxy);
                const json = await res.json();
                const data = JSON.parse(json.contents);

                if (!data.list || data.list.length === 0) {
                    status.innerText = "탐색 완료!";
                    break;
                }

                status.innerText = `${page}페이지 스캔 중... (${data.list.length}명 확인)`;

                const filtered = data.list.filter(user => user.nickname.includes(targetName));
                
                filtered.forEach(user => {
                    const div = document.createElement('div');
                    div.className = 'user-card';
                    div.onclick = () => window.open(`https://playentry.org{user._id}`);
                    
                    const pfp = user.profileImg ? 
                        `https://playentry.org{user.profileImg.substring(0,2)}/${user.profileImg.substring(2,4)}/image/${user.profileImg}` : 
                        'https://playentry.org';

                    div.innerHTML = `<img src="${pfp}"><span>${user.nickname}</span>`;
                    results.appendChild(div);
                });

            } catch (err) {
                console.error(err);
                status.innerText = "오류 발생! 잠시 후 다시 시도하세요.";
                break;
            }
        }
        if(results.innerHTML === '') status.innerText = "찾는 유저가 목록에 없습니다.";
        else status.innerText = "검색 완료!";
    }
</script>

</body>
</html>
