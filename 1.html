<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Entry Perfect Searcher</title>
    <style>
        :root { --main: #00c73c; --bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--main); color: white; border: none; font-weight: bold; cursor: pointer; }
        .status { font-size: 0.85rem; color: #666; margin: 10px 0; }
        .result-grid { display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%; max-width: 450px; margin-top: 20px; }
        .user-card { background: white; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; border: 2px solid #eee; cursor: pointer; }
        .user-card img { width: 50px; height: 50px; border-radius: 50%; }
        .user-info { text-align: left; }
        .user-info b { display: block; font-size: 1rem; }
        .user-info span { font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h3>🔍 정밀 유저 검색 (오류 해결판)</h3>
    <p style="font-size:0.8rem; color:#666;">팔로우했는데 안 나온다면 닉네임 <b>대소문자</b>를 확인하세요!</p>
    <input type="text" id="target" placeholder="검색할 정확한 닉네임 입력">
    <button onclick="perfectSearch()">실시간 데이터 강제 조회</button>
    <div id="status" class="status">대기 중...</div>
</div>

<div id="results" class="result-grid"></div>

<script>
    async function perfectSearch() {
        const name = document.getElementById('target').value.trim();
        const status = document.getElementById('status');
        const results = document.getElementById('results');

        if(!name) return;
        results.innerHTML = '';
        status.innerText = "🚀 여러 프록시 서버를 통해 데이터를 찾는 중...";

        // 1. 직접 유저명으로 검색 시도 (대소문자 일치 필수)
        const api = `https://playentry.org{encodeURIComponent(name)}`;
        
        // 프록시 서버 목록 (allorigins, corsproxy 등)
        const proxyUrls = [
            `https://allorigins.win{encodeURIComponent(api)}&_=${Date.now()}`,
            `https://codetabs.com{encodeURIComponent(api)}`
        ];

        let userData = null;

        for (let url of proxyUrls) {
            try {
                const res = await fetch(url);
                const text = await res.text();
                const json = text.includes('"contents":') ? JSON.parse(JSON.parse(text).contents) : JSON.parse(text);
                
                if (json && json._id) {
                    userData = json;
                    break;
                }
            } catch (e) { console.warn("Proxy failed, trying next..."); }
        }

        if (userData) {
            status.innerText = "✅ 유저를 찾았습니다!";
            const div = document.createElement('div');
            div.className = 'user-card';
            div.onclick = () => window.open(`https://playentry.org{userData._id}`);
            
            const pfp = userData.profileImg ? 
                `https://playentry.org{userData.profileImg.substring(0,2)}/${userData.profileImg.substring(2,4)}/image/${userData.profileImg}` : 
                'https://playentry.org';

            div.innerHTML = `
                <img src="${pfp}">
                <div class="user-info">
                    <b>${userData.nickname}</b>
                    <span>팔로워: ${userData.followerCount} | 팔로잉: ${userData.followingCount}</span>
                </div>
            `;
            results.appendChild(div);
        } else {
            status.innerHTML = "❌ 유저를 찾지 못했습니다.<br>1. 닉네임 <b>대소문자</b>가 정확한지 확인<br>2. 탈퇴한 계정인지 확인";
        }
    }
</script>
</body>
</html>
