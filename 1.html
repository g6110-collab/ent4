<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entry User Finder - 엔트리 유저 검색</title>
    <style>
        :root { --primary-color: #6c5ce7; --bg-color: #f0f2f5; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: var(--primary-color); margin-bottom: 1.5rem; font-size: 1.5rem; }
        .search-box { display: flex; gap: 10px; margin-bottom: 2rem; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 10px; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: var(--primary-color); }
        button { padding: 12px 20px; background: var(--primary-color); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #result { display: none; animation: fadeIn 0.5s; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--primary-color); margin-bottom: 1rem; }
        .info-card { text-align: left; background: #f8f9fa; padding: 15px; border-radius: 10px; margin-top: 1rem; }
        .info-item { margin: 8px 0; font-size: 0.9rem; color: #444; }
        .error { color: #ff7675; margin-top: 10px; font-size: 0.9rem; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 엔트리 유저 검색</h1>
        <div class="search-box">
            <input type="text" id="username" placeholder="유저 닉네임을 입력하세요" onkeypress="if(event.keyCode==13) searchUser()">
            <button onclick="searchUser()">검색</button>
        </div>
        
        <div id="loader" style="display:none;">불러오는 중...</div>
        <div id="error-msg" class="error"></div>

        <div id="result">
            <img id="pfp" class="profile-img" src="" alt="프로필">
            <h2 id="nickname" style="margin:0;"></h2>
            <p id="bio" style="color:#666; font-size:0.9rem;"></p>
            
            <div class="info-card">
                <div class="info-item">🆔 <b>아이디:</b> <span id="res-id"></span></div>
                <div class="info-item">🎭 <b>권한:</b> <span id="res-role"></span></div>
                <div class="info-item">👥 <b>팔로워:</b> <span id="res-followers"></span></div>
                <div class="info-item">👤 <b>팔로잉:</b> <span id="res-following"></span></div>
            </div>
            <button id="profile-link" style="margin-top:15px; width:100%; background:#00b894;">마이페이지 방문</button>
        </div>
    </div>

    <script>
        async function searchUser() {
            const username = document.getElementById('username').value.trim();
            const resultDiv = document.getElementById('result');
            const errorMsg = document.getElementById('error-msg');
            const loader = document.getElementById('loader');

            if(!username) return;

            // 초기화
            resultDiv.style.display = 'none';
            errorMsg.innerText = '';
            loader.style.display = 'block';

            try {
                // 엔트리 API 호출 (CORS 우회를 위해 프록시 사용 권장되나, 브라우저 환경에 따라 직접 호출 시도)
                const response = await fetch(`https://playentry.org/api/getUserByUsername/${username}`);
                
                if (!response.ok) throw new Error('유저를 찾을 수 없습니다.');
                
                const data = await response.json();
                
                if(!data || data.message) {
                    errorMsg.innerText = '존재하지 않는 유저입니다.';
                    return;
                }

                // 데이터 바인딩
                document.getElementById('pfp').src = data.profileImg ? `https://playentry.org{data.profileImg.substring(0,2)}/${data.profileImg.substring(2,4)}/image/${data.profileImg}` : 'https://playentry.org';
                document.getElementById('nickname').innerText = data.nickname;
                document.getElementById('bio').innerText = data.description || '소개글이 없습니다.';
                document.getElementById('res-id').innerText = data.username;
                document.getElementById('res-role').innerText = data.role;
                document.getElementById('res-followers').innerText = data.followerCount || 0;
                document.getElementById('res-following').innerText = data.followingCount || 0;
                
                document.getElementById('profile-link').onclick = () => {
                    window.open(`https://playentry.org{data._id}`, '_blank');
                };

                loader.style.display = 'none';
                resultDiv.style.display = 'block';

            } catch (err) {
                loader.style.display = 'none';
                errorMsg.innerText = '검색 중 오류가 발생했습니다. (닉네임을 정확히 입력해주세요)';
                console.error(err);
            }
        }
    </script>
</body>
</html>
