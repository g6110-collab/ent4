<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entry User Quick Search</title>
    <style>
        :root { --entry-green: #00c73c; --bg: #f5f6f7; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; justify-content: center; padding-top: 50px; margin: 0; }
        .search-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; font-size: 1.25rem; }
        .input-group { position: relative; display: flex; gap: 8px; }
        input { flex: 1; padding: 14px; border: 2px solid #eee; border-radius: 12px; outline: none; transition: 0.2s; font-size: 1rem; }
        input:focus { border-color: var(--entry-green); }
        button { padding: 0 20px; background: var(--entry-green); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
        
        #result { margin-top: 25px; display: none; border-top: 1px solid #eee; padding-top: 25px; animation: slideUp 0.3s ease; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .nickname { font-size: 1.2rem; font-weight: bold; margin: 10px 0 5px; color: #222; }
        .username { color: #888; font-size: 0.9rem; margin-bottom: 15px; }
        .stats { display: flex; justify-content: space-around; background: #f9f9f9; padding: 15px; border-radius: 12px; font-size: 0.85rem; }
        .stat-item b { display: block; color: var(--entry-green); font-size: 1rem; }
        .visit-btn { display: block; margin-top: 20px; padding: 12px; background: #333; color: white; text-decoration: none; border-radius: 10px; font-size: 0.9rem; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loader { display: none; margin-top: 15px; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="search-card">
    <h2>👤 유저 바로 찾기</h2>
    <div class="input-group">
        <input type="text" id="targetName" placeholder="정확한 닉네임 입력" onkeypress="if(event.keyCode==13) directSearch()">
        <button onclick="directSearch()">검색</button>
    </div>
    
    <div id="loader" class="loader">엔트리 데이터 조회 중...</div>

    <div id="result">
        <img id="res-pfp" class="profile-img" src="" alt="PFP">
        <div id="res-nickname" class="nickname"></div>
        <div id="res-username" class="username"></div>
        <div class="stats">
            <div class="stat-item"><b>팔로워</b><span id="res-followers">-</span></div>
            <div class="stat-item"><b>팔로잉</b><span id="res-following">-</span></div>
            <div class="stat-item"><b>권한</b><span id="res-role">-</span></div>
        </div>
        <a id="res-link" href="#" target="_blank" class="visit-btn">프로필 페이지 열기</a>
    </div>
</div>

<script>
    async function directSearch() {
        const name = document.getElementById('targetName').value.trim();
        const resultDiv = document.getElementById('result');
        const loader = document.getElementById('loader');
        
        if(!name) return alert("닉네임을 입력해주세요!");

        resultDiv.style.display = 'none';
        loader.style.display = 'block';

        try {
            // Allorigins 프록시를 통해 엔트리 API 직접 타격
            const api = `https://playentry.org{encodeURIComponent(name)}`;
            const proxy = `https://allorigins.win{encodeURIComponent(api)}`;
            
            const response = await fetch(proxy);
            const json = await response.json();
            const data = JSON.parse(json.contents);

            if(!data || data.message === "Not Found" || !data.nickname) {
                alert("존재하지 않는 유저입니다. (대소문자 확인 필요)");
                loader.style.display = 'none';
                return;
            }

            // 프로필 정보 매핑
            document.getElementById('res-nickname').innerText = data.nickname;
            document.getElementById('res-username').innerText = `@${data.username}`;
            document.getElementById('res-followers').innerText = data.followerCount || 0;
            document.getElementById('res-following').innerText = data.followingCount || 0;
            document.getElementById('res-role').innerText = data.role === 'admin' ? '운영자' : '일반유저';
            document.getElementById('res-link').href = `https://playentry.org{data._id}`;
            
            const pfp = data.profileImg ? 
                `https://playentry.org{data.profileImg.substring(0,2)}/${data.profileImg.substring(2,4)}/image/${data.profileImg}` : 
                'https://playentry.org';
            document.getElementById('res-pfp').src = pfp;

            loader.style.display = 'none';
            resultDiv.style.display = 'block';

        } catch (e) {
            alert("검색 중 오류가 발생했습니다.");
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
